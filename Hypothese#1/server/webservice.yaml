apiVersion: apps/v1
kind: Deployment
metadata:
  name: webservice-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webservice
  template:
    metadata:
      labels:
        app: webservice
    spec:
      containers:
      - name: webservice
        image: stephanebrillant/inf36307:rest-api
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m  # 0.1 CPU par pod
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
